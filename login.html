<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>로그인 - 송훈 Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#222222',
                        secondary: '#7B7B7B',
                        brand: '#000000',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#F8F8F8] text-primary font-sans flex flex-col min-h-[100dvh] antialiased">
    <!-- Navigation (Back) -->
    <nav class="p-4 lg:p-6 w-full max-w-7xl mx-auto flex-shrink-0">
        <a href="index.html" class="inline-flex items-center gap-2 text-primary font-medium hover:text-secondary min-h-[44px] px-2 -ml-2 rounded-lg transition-colors">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>돌아가기</span>
        </a>
    </nav>

    <!-- Main Login Container -->
    <main class="flex-1 flex flex-col justify-center px-4 md:px-6 w-full max-w-7xl mx-auto items-center pb-[10vh]">
        <div class="w-full max-w-md bg-white rounded-[2rem] p-8 sm:p-10 md:p-12 shadow-[0_10px_40px_rgba(0,0,0,0.03)] border border-gray-100">
            <!-- Header -->
            <div class="text-center mb-10">
                <div class="w-14 h-14 bg-primary rounded-xl mx-auto mb-6 flex items-center justify-center shadow-md">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M12 21.3L1.5 12H12l0 9.3zm0 0L22.5 12H12l0 9.3z" fill="#FFF"/>
                        <circle cx="12" cy="5" r="3" fill="#FFF"/>
                    </svg>
                </div>
                <h1 class="text-3xl font-bold tracking-tight mb-3">환영합니다</h1>
                <p class="text-secondary text-sm md:text-base">서비스 이용을 위해 로그인 해주세요.</p>
            </div>

            <!-- Form -->
            <form action="#" class="space-y-6">
                <div>
                    <label for="email" class="block text-[15px] font-semibold text-primary mb-2.5">이메일</label>
                    <input type="email" id="email" required placeholder="name@example.com" 
                           class="w-full h-[52px] sm:h-[56px] px-5 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white inset-0 focus:ring-[3px] focus:ring-gray-200 focus:border-brand transition-all outline-none text-base">
                </div>
                
                <div>
                    <div class="flex justify-between items-center mb-2.5">
                        <label for="password" class="block text-[15px] font-semibold text-primary">비밀번호</label>
                        <a href="#" class="text-sm font-semibold text-secondary hover:text-brand px-2 -mr-2 min-h-[44px] flex items-center">비밀번호 찾기</a>
                    </div>
                    <input type="password" id="password" required placeholder="••••••••" 
                           class="w-full h-[52px] sm:h-[56px] px-5 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white inset-0 focus:ring-[3px] focus:ring-gray-200 focus:border-brand transition-all outline-none text-base">
                </div>

                <div class="pt-4">
                    <button type="submit" 
                            class="w-full h-[56px] bg-brand text-white font-semibold rounded-xl hover:bg-gray-800 active:scale-[0.98] transition-all text-[17px] shadow-sm flex items-center justify-center">
                        로그인
                    </button>
                </div>
            </form>

            <div class="mt-8 text-center pt-6 border-t border-gray-100">
                <p class="text-secondary text-sm">
                    계정이 없으신가요? 
                    <a href="#" class="font-semibold text-primary hover:text-brand border-b border-primary hover:border-brand pb-0.5 ml-1 inline-flex items-center min-h-[44px]">회원가입</a>
                </p>
            </div>
        </div>
    </main>
</body>
</html>
